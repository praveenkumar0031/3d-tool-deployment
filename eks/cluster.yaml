apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: 3d-tool
  region: us-east-1
  version: "1.31"

managedNodeGroups:
  - name: workers
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 3

    volumeSize: 20

    ssh:
      allow: false

iam:
  withOIDC: true